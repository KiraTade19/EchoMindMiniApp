<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 14px; color: var(--tg-theme-hint-color, #888); margin-bottom: 24px; }
    .toggles { display: flex; gap: 8px; margin-bottom: 20px; }
    .toggle {
      flex: 1; padding: 12px; text-align: center; border-radius: 12px;
      border: 2px solid var(--tg-theme-button-color, #40a7e3);
      background: transparent; color: var(--tg-theme-button-color, #40a7e3);
      font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s;
    }
    .toggle.active {
      background: var(--tg-theme-button-color, #40a7e3);
      color: var(--tg-theme-button-text-color, #fff);
    }
    input {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      font-size: 16px; outline: none; margin-bottom: 24px;
    }
    input:focus { border-color: var(--tg-theme-button-color, #40a7e3); }
    .submit {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: var(--tg-theme-button-color, #40a7e3);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h1>Create Account</h1>
  <p>Choose your account type and enter your name</p>

  <div class="toggles">
    <div class="toggle active" data-type="company" onclick="selectType('company')">Company</div>
    <div class="toggle" data-type="individual" onclick="selectType('individual')">Individual</div>
  </div>

  <input type="text" id="nameInput" placeholder="Company name" autocomplete="off">
  <div class="error" id="errorMsg">Please enter a name</div>

  <button class="submit" id="submitBtn" onclick="submit()">Register</button>

  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    var selectedType = 'company';
    var nameInput = document.getElementById('nameInput');
    var errorMsg = document.getElementById('errorMsg');
    var submitBtn = document.getElementById('submitBtn');

    function selectType(type) {
      selectedType = type;
      var toggles = document.querySelectorAll('.toggle');
      for (var i = 0; i < toggles.length; i++) {
        var el = toggles[i];
        if (el.dataset.type === type) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      }
      nameInput.placeholder = type === 'company' ? 'Company name' : 'Your name';
      nameInput.focus();
    }

    nameInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submit();
    });

    function submit() {
      var name = nameInput.value.trim();
      if (!name) {
        errorMsg.style.display = 'block';
        return;
      }
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Registering...';

      var safeName = name.replace(/[^a-zA-Z0-9 ]/g, ' ').trim();
      var shortName = safeName.substring(0, 40);
      var finalName = shortName.replace(/ /g, '_');
      var typeCode = selectedType === 'company' ? 'c' : 'i';
      var link = 'https://t.me/EchoMind0bot?start=reg_' + typeCode + '_' + finalName;
      tg.openTelegramLink(link);
    }
  </script>
</body>
</html>
